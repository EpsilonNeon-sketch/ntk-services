<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - NTK Services</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS v4 -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .tab-btn.active {
            background: white;
            color: #0f172a;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- NAVIGATION -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col sm:flex-row justify-between items-center py-4 gap-4">
                <!-- Logo -->
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 text-white p-2 rounded-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />
                            <path d="m9 12 2 2 4-4" />
                        </svg>
                    </div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-900">NTK<span
                            class="text-blue-600">Admin</span></h1>
                </div>

                <!-- Back to Site Button -->
                <a href="index.html"
                    class="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-slate-900 hover:bg-white hover:shadow-sm transition-all flex items-center gap-2 bg-slate-100/50 border border-slate-200/60">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Back to Site
                </a>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">

        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Admin Dashboard</h2>
            <p class="text-slate-500 mt-2">Manage your products, services, accounts, and orders</p>
        </div>

        <!-- Tab Navigation -->
        <div class="flex flex-wrap gap-2 bg-slate-100/50 p-1 rounded-2xl border border-slate-200/60 mb-8">
            <button onclick="showTab('products')"
                class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-slate-900 transition-all flex items-center gap-2 active"
                data-tab="products">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m7.5 4.27 9 5.15" />
                    <path
                        d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
                    <path d="m3.3 7 8.7 5 8.7-5" />
                    <path d="M12 22V12" />
                </svg>
                Products
            </button>
            <button onclick="showTab('services')"
                class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-slate-900 transition-all flex items-center gap-2"
                data-tab="services">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
                </svg>
                Services
            </button>
            <button onclick="showTab('accounts')"
                class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-slate-900 transition-all flex items-center gap-2"
                data-tab="accounts">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                </svg>
                Accounts
            </button>
            <button onclick="showTab('orders')"
                class="tab-btn px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:text-slate-900 transition-all flex items-center gap-2"
                data-tab="orders">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
                    <path d="M3 6h18" />
                    <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                Orders
            </button>
        </div>

        <!-- PRODUCTS TAB -->
        <div id="products-tab" class="tab-content">
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-slate-900">Add New Product</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Product Name</label>
                        <input type="text" id="product-name"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Premium Laptop">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Price</label>
                        <input type="number" id="product-price" step="0.01"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="999.99">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Description</label>
                        <textarea id="product-description" rows="3"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="High-performance laptop with cutting-edge features"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <button onclick="addProduct()"
                            class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-2 rounded-xl font-medium text-sm transition-colors">
                            Add Product
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6">
                <h3 class="text-xl font-bold text-slate-900 mb-6">All Products</h3>
                <div id="products-list" class="space-y-4">
                    <!-- Products will load here -->
                </div>
            </div>
        </div>

        <!-- SERVICES TAB -->
        <div id="services-tab" class="tab-content hidden">
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6 mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-slate-900">Add New Service</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Service Name</label>
                        <input type="text" id="service-name"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="TV Mounting">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Price</label>
                        <input type="number" id="service-price" step="0.01"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="149.99">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-2">Description</label>
                        <textarea id="service-description" rows="3"
                            class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Professional TV mounting service with cable management"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <button onclick="addService()"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-xl font-medium text-sm transition-colors">
                            Add Service
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6">
                <h3 class="text-xl font-bold text-slate-900 mb-6">All Services</h3>
                <div id="services-list" class="space-y-4">
                    <!-- Services will load here -->
                </div>
            </div>
        </div>

        <!-- ACCOUNTS TAB -->
        <div id="accounts-tab" class="tab-content hidden">
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6">
                <h3 class="text-xl font-bold text-slate-900 mb-6">User Accounts</h3>
                <div id="accounts-list" class="space-y-4">
                    <!-- Accounts will load here -->
                </div>
            </div>
        </div>

        <!-- ORDERS TAB -->
        <div id="orders-tab" class="tab-content hidden">
            <div class="bg-white rounded-3xl border border-slate-100 shadow-sm p-6">
                <h3 class="text-xl font-bold text-slate-900 mb-6">All Orders</h3>
                <div id="orders-list" class="space-y-4">
                    <!-- Orders will load here -->
                </div>
            </div>
        </div>

    </main>

    <!-- NOTIFICATION -->
    <div id="notification" class="fixed top-4 right-4 z-50 hidden">
        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-4 min-w-[300px]">
            <div class="flex items-center gap-3">
                <div id="notif-icon"></div>
                <p id="notif-message" class="text-sm font-medium text-slate-900"></p>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase (replace with your credentials)
        const SUPABASE_URL = 'https://ryoiycupoohyfasiugns.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5b2l5Y3Vwb29oeWZhc2l1Z25zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTEyNzAsImV4cCI6MjA5MDk2NzI3MH0.vrEle9LQgtYMZ7rYSyDpZf7hxZRaisW1s04Lfj4IAU0';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Show notification
        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            const notifMessage = document.getElementById('notif-message');
            const notifIcon = document.getElementById('notif-icon');

            notifMessage.textContent = message;

            if (type === 'success') {
                notifIcon.innerHTML = `
                    <div class="w-8 h-8 bg-green-50 text-green-600 rounded-xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                `;
            } else {
                notifIcon.innerHTML = `
                    <div class="w-8 h-8 bg-red-50 text-red-600 rounded-xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </div>
                `;
            }

            notif.classList.remove('hidden');
            setTimeout(() => {
                notif.classList.add('hidden');
            }, 3000);
        }

        // Format price
        function formatPrice(price) {
            return `$${parseFloat(price).toFixed(2)}`;
        }

        // Tab switching
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });

            // Remove active class from all buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(`${tabName}-tab`).classList.remove('hidden');

            // Add active class to clicked button
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

            // Load data for the tab
            if (tabName === 'products') loadProducts();
            else if (tabName === 'services') loadServices();
            else if (tabName === 'accounts') loadAccounts();
            else if (tabName === 'orders') loadOrders();
        }

        // PRODUCTS FUNCTIONS
        async function loadProducts() {
            try {
                const { data, error } = await sb
                    .from('products')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                const productsList = document.getElementById('products-list');

                if (!data || data.length === 0) {
                    productsList.innerHTML = `
                        <p class="text-slate-500 text-center py-8">No products yet. Add one above!</p>
                    `;
                    return;
                }

                productsList.innerHTML = '';

                data.forEach(product => {
                    const productCard = document.createElement('div');
                    productCard.className = 'border border-slate-200 rounded-2xl p-4 flex items-center justify-between hover:bg-slate-50 transition-colors';
                    productCard.innerHTML = `
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-900">${product.name}</h4>
                            <p class="text-sm text-slate-500 mt-1">${product.description || 'No description'}</p>
                            <p class="text-sm font-semibold text-blue-600 mt-2">${formatPrice(product.price)}</p>
                        </div>
                        <button 
                            onclick="deleteProduct(${product.id})"
                            class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl font-medium text-sm transition-colors"
                        >
                            Delete
                        </button>
                    `;
                    productsList.appendChild(productCard);
                });

            } catch (error) {
                console.error('Load products error:', error);
                showNotification('Failed to load products', 'error');
            }
        }

        async function addProduct() {
            const name = document.getElementById('product-name').value.trim();
            const price = parseFloat(document.getElementById('product-price').value);
            const description = document.getElementById('product-description').value.trim();

            if (!name || !price || price <= 0) {
                showNotification('Please fill in all required fields', 'error');
                return;
            }

            try {
                const { error } = await sb
                    .from('products')
                    .insert([{ name, price, description }]);

                if (error) throw error;

                showNotification('Product added successfully!', 'success');

                // Clear form
                document.getElementById('product-name').value = '';
                document.getElementById('product-price').value = '';
                document.getElementById('product-description').value = '';

                // Reload products
                loadProducts();

            } catch (error) {
                console.error('Add product error:', error);
                showNotification('Failed to add product', 'error');
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const { error } = await sb
                    .from('products')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showNotification('Product deleted successfully!', 'success');
                loadProducts();

            } catch (error) {
                console.error('Delete product error:', error);
                showNotification('Failed to delete product', 'error');
            }
        }

        // SERVICES FUNCTIONS
        async function loadServices() {
            try {
                const { data, error } = await sb
                    .from('services')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                const servicesList = document.getElementById('services-list');

                if (!data || data.length === 0) {
                    servicesList.innerHTML = `
                        <p class="text-slate-500 text-center py-8">No services yet. Add one above!</p>
                    `;
                    return;
                }

                servicesList.innerHTML = '';

                data.forEach(service => {
                    const serviceCard = document.createElement('div');
                    serviceCard.className = 'border border-slate-200 rounded-2xl p-4 flex items-center justify-between hover:bg-slate-50 transition-colors';
                    serviceCard.innerHTML = `
                        <div class="flex-1">
                            <h4 class="font-bold text-slate-900">${service.name}</h4>
                            <p class="text-sm text-slate-500 mt-1">${service.description || 'No description'}</p>
                            <p class="text-sm font-semibold text-blue-600 mt-2">${formatPrice(service.price)}</p>
                        </div>
                        <button 
                            onclick="deleteService(${service.id})"
                            class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl font-medium text-sm transition-colors"
                        >
                            Delete
                        </button>
                    `;
                    servicesList.appendChild(serviceCard);
                });

            } catch (error) {
                console.error('Load services error:', error);
                showNotification('Failed to load services', 'error');
            }
        }

        async function addService() {
            const name = document.getElementById('service-name').value.trim();
            const price = parseFloat(document.getElementById('service-price').value);
            const description = document.getElementById('service-description').value.trim();

            if (!name || !price || price <= 0) {
                showNotification('Please fill in all required fields', 'error');
                return;
            }

            try {
                const { error } = await sb
                    .from('services')
                    .insert([{ name, price, description }]);

                if (error) throw error;

                showNotification('Service added successfully!', 'success');

                // Clear form
                document.getElementById('service-name').value = '';
                document.getElementById('service-price').value = '';
                document.getElementById('service-description').value = '';

                // Reload services
                loadServices();

            } catch (error) {
                console.error('Add service error:', error);
                showNotification('Failed to add service', 'error');
            }
        }

        async function deleteService(id) {
            if (!confirm('Are you sure you want to delete this service?')) return;

            try {
                const { error } = await sb
                    .from('services')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showNotification('Service deleted successfully!', 'success');
                loadServices();

            } catch (error) {
                console.error('Delete service error:', error);
                showNotification('Failed to delete service', 'error');
            }
        }

        // ACCOUNTS FUNCTIONS
        async function loadAccounts() {
            try {
                const { data, error } = await sb
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const accountsList = document.getElementById('accounts-list');

                if (!data || data.length === 0) {
                    accountsList.innerHTML = `
                        <p class="text-slate-500 text-center py-8">No user accounts found.</p>
                    `;
                    return;
                }

                accountsList.innerHTML = '';

                data.forEach(profile => {
                    const accountCard = document.createElement('div');
                    accountCard.className = 'border border-slate-200 rounded-2xl p-4 hover:bg-slate-50 transition-colors';
                    accountCard.innerHTML = `
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center font-bold">
                                        ${profile.username ? profile.username.charAt(0).toUpperCase() : '?'}
                                    </div>
                                    <div>
                                        <h4 class="font-bold text-slate-900">${profile.username || 'No username'}</h4>
                                        <p class="text-sm text-slate-500">${profile.email || 'No email'}</p>
                                    </div>
                                </div>
                                <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
                                    <div>
                                        <span class="text-slate-500">ID:</span>
                                        <span class="text-slate-900 font-mono">${profile.id.substring(0, 8)}...</span>
                                    </div>
                                    <div>
                                        <span class="text-slate-500">Created:</span>
                                        <span class="text-slate-900">${new Date(profile.created_at).toLocaleDateString()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    accountsList.appendChild(accountCard);
                });

            } catch (error) {
                console.error('Load accounts error:', error);
                showNotification('Failed to load accounts', 'error');
            }
        }

        // ORDERS FUNCTIONS
        async function loadOrders() {
            try {
                const { data, error } = await sb
                    .from('orders')
                    .select(`
                        *,
                        profiles (username, email),
                        order_items (
                            id,
                            quantity,
                            price,
                            item_type,
                            item_id
                        )
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const ordersList = document.getElementById('orders-list');

                if (!data || data.length === 0) {
                    ordersList.innerHTML = `
                        <p class="text-slate-500 text-center py-8">No orders yet.</p>
                    `;
                    return;
                }

                ordersList.innerHTML = '';

                data.forEach(order => {
                    const orderCard = document.createElement('div');
                    orderCard.className = 'border border-slate-200 rounded-2xl p-4 hover:bg-slate-50 transition-colors';
                    
                    let statusBadgeClass = 'bg-blue-50 text-blue-600';
                    if (order.status === 'completed') {
                        statusBadgeClass = 'bg-green-50 text-green-600';
                    } else if (order.status === 'pending') {
                        statusBadgeClass = 'bg-yellow-50 text-yellow-600';
                    }
                    
                    orderCard.innerHTML = `
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <h4 class="font-bold text-slate-900">Order #${order.id}</h4>
                                <p class="text-sm text-slate-500 mt-1">
                                    ${order.profiles?.username || 'Guest'} · ${order.profiles?.email || 'No email'}
                                </p>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusBadgeClass}">
                                    ${order.status}
                                </span>
                                <span class="text-lg font-bold text-slate-900">${formatPrice(order.total)}</span>
                            </div>
                        </div>
                        
                        <div class="border-t border-slate-100 pt-3 mt-3">
                            <p class="text-sm text-slate-500 mb-2">Items (${order.order_items?.length || 0}):</p>
                            <div class="space-y-1">
                                ${order.order_items?.map(item => `
                                    <div class="text-sm text-slate-700">
                                        · ${item.item_type} #${item.item_id} - Qty: ${item.quantity} - ${formatPrice(item.price)}
                                    </div>
                                `).join('') || '<p class="text-sm text-slate-400">No items</p>'}
                            </div>
                        </div>
                        
                        <div class="border-t border-slate-100 pt-3 mt-3 text-xs text-slate-400">
                            Created: ${new Date(order.created_at).toLocaleString()}
                        </div>
                    `;
                    ordersList.appendChild(orderCard);
                });

            } catch (error) {
                console.error('Load orders error:', error);
                showNotification('Failed to load orders', 'error');
            }
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            showTab('products');
        });
    </script>
</body>

</html>
